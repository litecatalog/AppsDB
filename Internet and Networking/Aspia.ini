[App.Locale.ru-ru]
Version = Последняя
Description = Программа для удалённого управления ПК, передачи файлов и получения состояния системы.
Notes = Aspia Host (хост) - устанавливается на клиентских ПК\nAspia Console (консоль) - необходим для подключения к удаленным ПК и управления Aspia Router.\nAspia Client (клиент) - легкая версия клиента для подключения к удаленным ПК.\nAspia Router (маршрутизатор) - реализация ID сервера, используется для обхода NAT.\nAspia Relay (ретранслятор) - работает совместно с Router и служит для балансировки нагрузки.

