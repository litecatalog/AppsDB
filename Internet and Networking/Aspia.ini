Notes = Aspia Host (host) - installed on client PCs\nAspia Console (console) - required to connect to remote PCs and manage Aspia Router\nAspia Client (client) - a lightweight version for connecting to remote PCs\nAspia Router (router) - an ID server implementation, used for NAT traversal\nAspia Relay (relay) - works with the Router and serves for load balancing
