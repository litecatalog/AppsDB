Notes = SerialSend command examples:\nSend text: SerialSend.exe "abc 123"\nSend with baudrate: SerialSend.exe /baudrate 9600 "Hello world!"\nSend to COM10: SerialSend.exe /devnum 10 "S120 E360"\nSend hex: SerialSend.exe /hex "abc\x0A"\nSend CR+LF: SerialSend.exe /hex "Hello\r&...n"\nSend with delay: SerialSend.exe /devnum 5 /closedelay 500 "ABCD\r"\nSend no scan: SerialSend.exe /devnum 5 /noscan "hello"\nEven parity: SerialSend.exe /devnum 3 /evenparity /baudrate 9600 "hello"\nOdd parity: SerialSend.exe /devnum 3 /oddparity /baudrate 9600 "hello"\nQuiet: SerialSend.exe /quiet /devnum 10 /baudrate 9600 "hello"
