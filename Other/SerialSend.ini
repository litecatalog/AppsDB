Description = Утилита для отправки текста и данных через последовательный порт (COM). Выбирайте порт и скорость или используйте автопоиск для микроконтроллеров и USB-to-serial устройств.
Notes = Примеры команд SerialSend:\nОтправка текста: SerialSend.exe "abc 123"\nОтправка с указанием скорости: SerialSend.exe /baudrate 9600 "Hello world!"\nОтправка на COM10: SerialSend.exe /devnum 10 "S120 E360"\nОтправка hex-значений: SerialSend.exe /hex "abc\x0A"\nОтправка с CR+LF: SerialSend.exe /hex "Hello\r&...n"\nОтправка с задержкой и CR: SerialSend.exe /devnum 5 /closedelay 500 "ABCD\r"\nОтправка без сканирования портов: SerialSend.exe /devnum 5 /noscan "hello"\nОтправка с чётной паритетностью: SerialSend.exe /devnum 3 /evenparity /baudrate 9600 "hello"\nОтправка с нечётной паритетностью: SerialSend.exe /devnum 3 /oddparity /baudrate 9600 "hello"\nОтправка без вывода сообщений: SerialSend.exe /quiet /devnum 10 /baudrate 9600 "hello"
