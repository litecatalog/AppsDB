Notes = Создайте или используйте готовый конфигурационный ".txt" файл для эмуляции Xbox, DS4 контроллера или клавиатуры и мыши. Рекомендуется разместить файл в папке "GyroConfigs".\nПеретащите конфигурационный файл в интерфейс программы (drag and drop), чтобы загрузить его.\nГотовые гонфиги для игр можно найти здесь: http://gyrowiki.jibbsmart.com/games\nПодробнее тут: https://4pda.to/forum/index.php?showtopic=1084761\n\nДля скрытия контроллера в современных играх используйте утилиту HidHide.
