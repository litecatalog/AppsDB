Description = Графическая библиотека, исправляющая проблемы старых игр (DirectX 7/8/9) и позволяющая им корректно работать на современных Windows.
Notes = Распакуйте "dx7/8/9.games.zip" в папку с "exe" игры в зависимости от того, какой DirectX поддерживает игра, затем измените в "dxwrapper.ini" параметр: "EnableVSync" на "1" или "LimitPerFrameFPS" на "30" для ограничения кадров.
