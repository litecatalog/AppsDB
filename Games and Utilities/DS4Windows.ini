[App.Locale.ru-ru]
Description = Приложение для эмуляции Xbox геймпада для контроллеров Sony PlayStation и Nintendo, с удобным интерфейсом и различными настройками.
RequiredComponents = Microsoft Visual C++ 2015-2022 Redistributable; Microsoft .NET 8.0 Desktop Runtime; ViGEmBus (https://github.com/nefarius/ViGEmBus/releases); При использовании Steam отключите поддержку контроллеров Playstation и Switch;
Notes = Для выключения подсветки или изменения цвета нажмите на прямоугольник с цветом в списке устройств.\n\nДля включения прицеливания движениями (гироскоп) нажмите «Редактировать» (профиль), справа выберите вкладку «Гироскоп». Установите режим «Мышь» и «Triggers» - «L2», после чего при зажатии «L2» будет происходить эмуляция мыши движениями. К сожалению, не все игры хорошо работают с эмуляцией мыши, поэтому для проблемных игр можно переключить режим на «Джойстик мышь» для лучшей совместимости.\n\nДля эмуляции руля откройте «Редактировать» (профиль) - вкладка «Гироскоп» - установите Output Mode: «Controls» или «Left Stick», выберите ось X (наклоны влево/вправо).