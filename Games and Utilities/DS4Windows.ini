RequiredComponents = Microsoft Visual C++ 2015-2022 Redistributable; Microsoft .NET 8.0 Desktop Runtime; ViGEmBus (https://github.com/nefarius/ViGEmBus/releases); When using Steam, disable support for PlayStation and Switch controllers;
Notes = To turn off the lightbar or change its color, click the colored rectangle in the device list.\n\nTo enable motion aiming (gyro), click “Edit” (profile), then select the “Gyro” tab on the right. Set the mode to “Mouse” and “Triggers” - “L2”, after which holding “L2” will emulate mouse movement using motion. Unfortunately, not all games work well with mouse emulation, so for problematic games you can switch the mode to “Joystick Mouse” for better compatibility.\n\nTo emulate a steering wheel, open “Edit” (profile) - “Gyro” tab - set Output Mode to “Controls” or “Left Stick”, and select the X axis (tilt left/right).
