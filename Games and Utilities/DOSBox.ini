SHA1.x64 = 0
SizeBytes.x64 = 0
HashCheck = 1
NoArchiveNoInstaller = 0
ArchiveDesktopShortcuts =
ArchiveHasInstaller = 0
ArchiveInstallerName =
DownloadOnly = 0
SilentParameters =
RequiredComponents =
Notes = To automatically launch the game, create a file named "game.conf" in the game folder with the following content:\n[sdl]\nfullscreen=falsefulldouble=true\nfullresolution=desktop\nwindowresolution=original\noutput=ddraw\n\n[sblaster]\nsbtype=sb16\nsbbase=220\nirq=7\ndma=1\nhdma=5\nmixer=true\noplmode=auto\noplemu=default\nvolume=100\n\n[dosbox]\nmemsize=32\n\n[autoexec]\nmount c .\nc:\nGAME.EXE\nexit\n(to enable fullscreen mode, change fullscreen=false to fullscreen=true, and also change the game name from GAME.EXE to your own)\n\nAfter that, create a file named "Run.bat" in the game folder with the following content:\nset "DOSBOXPATH=C:\Program Files (x86)\DOSBox-0.74-3\DOSBox.exe"\nset "GAMEFOLDER=%~dp0"\nstart "" /min "%DOSBOXPATH%" -conf "%GAMEFOLDER%\game.conf"\n(change the path to DosBox as needed)\n\nFinally, create a shortcut to "Run.bat" on your desktop to launch the game.
DonatePage = https://www.dosbox.com

[App.Locale.ru-ru]
Version = Последняя
Description = Эмулятор DOS для ретро игр и программ.
Notes = Для автоматического запуска игры создайте файл "game.conf" в папке игры со следующим содержимым:\n[sdl]\nfullscreen=falsefulldouble=true\nfullresolution=desktop\nwindowresolution=original\noutput=ddraw\n\n[sblaster]\nsbtype=sb16\nsbbase=220\nirq=7\ndma=1\nhdma=5\nmixer=true\noplmode=auto\noplemu=default\nvolume=100\n\n[dosbox]\nmemsize=32\n\n[autoexec]\nmount c .\nc:\nGAME.EXE\nexit\n(для полноэкранного режима измените fullscreen=false на fullscreen=true, а также измените название игры с GAME.EXE на ваше)\n\nПосле этого создайте файл "Run.bat" в папке игры со следующим содержимым:\nset "DOSBOXPATH=C:\Program Files (x86)\DOSBox-0.74-3\DOSBox.exe"\nset "GAMEFOLDER=%~dp0"\nstart "" /min "%DOSBOXPATH%" -conf "%GAMEFOLDER%\game.conf"\n(измените путь до DosBox)\n\nДалее создайте ярлык для "Run.bat" на рабочем столе для запуска игры.