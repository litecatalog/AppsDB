Notes = To view the battery level and reset modes, press the center of the touchpad on Sony controllers. To reset modes on Nintendo, press the Capture button again.\n\nTo activate steering mode, hold the gamepad like a steering wheel, center it, and press the left area of the touchpad on Sony or the Capture button on Nintendo.\n\nTo activate aiming, press the right area of the touchpad (center or lower) on Sony or the Home button on Nintendo. To switch to L2 aiming, press the upper-right area on Sony or press the Home button a second time on Nintendo.\n\nScreenshots are taken with PS + X, as well as Mic or Capture + B. To record video, hold the corresponding buttons.\n\nMore details: https://github.com/r57zone/DSAdvance/
