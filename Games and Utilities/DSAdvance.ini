[App.Locale.ru-ru]
License = Общественное достояние
Description = Продвинутая эмуляция Xbox геймпада для Sony DualSense, DualSense Edge, DualShock 4, Nintendo Pro контроллера или Джойконов. Поддерживается прицеливание и вождение наклонами геймпада, эмуляция стиков на тачпаде, эмуляция клавиатуры и мыши, а также внешние педали, с дополнительными кнопками и другие джойстики Digispark.
Notes = Для просмотра заряда батареи и сброса режимов нажмите центр тачпада на контроллерах Sony. Для сброса режимов на Nintendo нажмите кнопку Capture повторно.\n\nДля активации режима руля удерживайте геймпад как руль, отцентрируйте его и нажмите левую область тачпада на Sony или кнопку Capture на Nintendo.\n\nДля активации прицеливания нажмите правую область тачпада (в центре или ниже) на Sony или кнопку Home на Nintendo. Чтобы переключиться на прицеливание по L2, нажмите верхнюю правую область на Sony или кнопку Home второй раз на Nintendo.\n\nСкриншоты делаются комбинацией PS + X, а также Mic или Capture + B. Для записи видео удерживайте соответствующие кнопки.\n\nПодробнее: https://github.com/r57zone/DSAdvance/blob/master/README.RU.md
