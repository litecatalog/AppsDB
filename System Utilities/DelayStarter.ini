[App]
Name = DelayStarter
Version = 1.1
License = Public-domain
Description = Utility for launching applications after a countdown timer or upon internet connection. If the internet is unavailable, the apps will wait for a connection instead of launching immediately, displaying a countdown timer.
Website = https://github.com/r57zone/DelayStarter/
Icon = delaystarter.png
Screenshots =
DownloadPage = https://github.com/r57zone/DelayStarter/releases/
DownloadURL.x86 = https://github.com/r57zone/DelayStarter/releases/download/1.1/DelayStarter.1.1.zip
SHA1.x86 = bef9fbe395000c1a15b463416b64e7bdaf349d6f
SizeBytes.x86 = 203516
DownloadURL.x64 = 
SHA1.x64 = 0
SizeBytes.x64 = 0
HashCheck = 1
NoArchiveNoInstaller = 0
ArchiveDesktopShortcuts = *
StartupShortcut = *
ArchiveHasInstaller = 0
ArchiveInstallerName =
DownloadOnly = 0
SilentParameters =
RequiredComponents =
Notes = Setup:\n1.Add full paths of applications to Apps.txt.\nTo pass launch arguments use "|" separator.\nExample: C:\Windows\System32&#92;notepad.exe|C:\log.txt.\n2. Add a shortcut to Windows startup folder:\n%AppData%\Microsoft\Windows\Start Menu\Programs\Startup\n\nParameters (Setup.ini):\nWaitInternet - 1: wait for internet, 0: use timer only\nWriteLaunchTime - 1: auto-save connection time to LaunchTime\nLaunchTime - delay in seconds before launching apps\nPlaySound - 1: play sound after launch, 0: silent\nSoundFile - path to .wav file
DonatePage = https://dalink.to/r57zone

[App.Locale.ru-ru]
License = Общественное достояние
Description = Приложение для запуска других программ после окончания таймера или после подключения к интернету. Если интернет недоступен - программы не запустятся сразу, а дождутся соединения, отображая обратный таймер.
Notes = Настройка:\n1. Добавьте полные пути приложений в Apps.txt.\nДля передачи аргументов используйте разделитель "|".\nПример: C:\Windows\System32&#92;notepad.exe|C:\log.txt.\n2. Добавьте ярлык в автозапуск Windows:\n%AppData%\Microsoft\Windows\Start Menu\Programs\Startup\n\nПараметры (Setup.ini):\nWaitInternet - 1: ждать интернет, 0: использовать только таймер\nWriteLaunchTime - 1: записать время соединения в LaunchTime\nLaunchTime - задержка в секундах перед запуском программ\nPlaySound - 1: играть звук после запуска, 0: без звука\nSoundFile - путь до .wav файла
